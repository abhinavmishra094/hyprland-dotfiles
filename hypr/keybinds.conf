# █▄▀ █▀▀ █▄█ █▄▄ █ █▄░█ █▀▄
# █░█ ██▄ ░█░ █▄█ █ █░▀█ █▄▀

bind = SUPER, B, exec, firefox
bind = SUPER, N, exec, vivaldi
bind = SUPER SHIFT, N, exec, flatpak run com.imputnet.Helium
bind = SUPER SHIFT, B, exec, flatpak run com.brave.Browser

bind = SUPER, Z, exec, /home/abhinav/.local/bin/zed
bind = SUPER, C, exec, google-chrome-stable
bind = SUPER, V, exec, code
bind = SUPER, L, exec, wlogout
bind = SUPER, P, exec, /usr/bin/postman
bind = SUPER, H, exec, ghb
bind = SUPER, T, exec, kate
bind = SUPER, M, exec, flatpak run io.missioncenter.MissionCenter
bind = SUPER, K, exec, ~/.config/hypr/keybind
bind = SUPER, J, hyprexpo:expo, toggle
bind = SUPER, F12, exec, pactl set-sink-volume @DEFAULT_AUDIO_SINK@ +5%
bind = SUPER, F11, exec, pactl set-sink-volume @DEFAULT_AUDIO_SINK@ -5%
bind = ALT, H, exec, ~/.config/hypr/toggle-scale.sh
bind = SUPER, SPACE, exec, wofi --show drun
bind = SUPER, I, Exec, hyprsettings


# █▀ █▀▀ █▀█ █▀▀ █▀▀ █▄░█ █▀ █░█ █▀█ ▀█▀
# ▄█ █▄▄ █▀▄ ██▄ ██▄ █░▀█ ▄█ █▀█ █▄█ ░█░
$screenshotarea = hyprctl keyword animation "fadeOut,0,0,default"; grimblast --notify copysave area; hyprctl keyword animation "fadeOut,1,4,default"
bind = SUPER SHIFT, S, exec, $screenshotarea
bind = , Print, exec, grimblast --notify --cursor copysave output
bind = ALT, Print, exec, grimblast --notify --cursor copysave screen

# █▀▄▀█ █ █▀ █▀▀
# █░▀░█ █ ▄█ █▄▄
bind = SUPER SHIFT, X, exec, hyprpicker -a -n
bind = CTRL ALT, L, exec, hyprlock
bind = SUPER, Return, exec, kitty
bind = SUPER, X, exec, kitty
bind = SUPER, E, exec, krusader
bind = SUPER, d, exec, kate ~/.config/hypr/hyprland.conf
bind = SUPER, R, exec,wofi --show drun
bind = ALT, R, exec, hyprlauncher
bind = SUPER, period, exec, killall rofi || rofi -show emoji -emoji-format "{emoji}" -modi emoji -theme ~/.config/rofi/global/emoji
bind = SUPER, escape, exec, wlogout --protocol layer-shell -b 5 -T 400 -B 400

# █░█░█ █ █▄░█ █▀▄ █▀█ █░█░█   █▀▄▀█ ▄▀█ █▄░█ ▄▀█ █▀▀ █▀▄▀█ █▀▀ █▄░█ ▀█▀
# ▀▄▀▄▀ █ █░▀█ █▄▀ █▄█ ▀▄▀▄▀   █░▀░█ █▀█ █░▀█ █▀█ █▄█ █░▀░█ ██▄ █░▀█ ░█░
bind = SUPER, Q, killactive,
bind = SUPER SHIFT, Q, exit,
bind = SUPER, F, fullscreen,
bind = SUPER, P, pseudo,
bind = SUPER, S, togglesplit,

# Switch layouts on current workspace
bind = SUPER SHIFT, D, exec, hyprctl keyword workspace $(hyprctl activeworkspace -j | jq -r '.id') layout dwindle
bind = SUPER SHIFT, M, exec, hyprctl keyword workspace $(hyprctl activeworkspace -j | jq -r '.id') layout master

# Master layout controls (only works when master layout is active)
bind = ALT, space, layoutmsg, swapwithmaster
bind = ALT, m, layoutmsg, focusmaster
bind = ALT, j, layoutmsg, cyclenext
bind = ALT, k, layoutmsg, cycleprev
bind = ALT, comma, layoutmsg, addmaster
bind = ALT, period, layoutmsg, removemaster



# █▀▀ █▀█ █▀▀ █░█ █▀
# █▀░ █▄█ █▄▄ █▄█ ▄█
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# █▀▄▀█ █▀█ █░█ █▀▀
# █░▀░█ █▄█ ▀▄▀ ██▄
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# █▀█ █▀▀ █▀ █ ▀█ █▀▀
# █▀▄ ██▄ ▄█ █ █▄ ██▄
bind = SUPER CTRL, left, resizeactive, -20 0
bind = SUPER CTRL, right, resizeactive, 20 0
bind = SUPER CTRL, up, resizeactive, 0 -20
bind = SUPER CTRL, down, resizeactive, 0 20

# ▀█▀ ▄▀█ █▄▄ █▄▄ █▀▀ █▀▄
# ░█░ █▀█ █▄█ █▄█ ██▄ █▄▀
bind = SUPER, g, togglegroup
bind = SUPER, tab, changegroupactive

# █▀ █▀█ █▀▀ █▀▀ █ ▄▀█ █░░
# ▄█ █▀▀ ██▄ █▄▄ █ █▀█ █▄▄
bind = SUPER, grave, togglespecialworkspace
bind = SUPERSHIFT, grave, movetoworkspace, special

# █▀ █░█░█ █ ▀█▀ █▀▀ █░█
# ▄█ ▀▄▀▄▀ █ ░█░ █▄▄ █▀█
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER ALT, up, workspace, e+1
bind = SUPER ALT, down, workspace, e-1

# █▀▄▀█ █▀█ █░█ █▀▀
# █░▀░█ █▄█ ▀▄▀ ██▄
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# █▀▄▀█ █▀█ █░█ █▀ █▀▀   █▄▄ █ █▄░█ █▀▄ █ █▄░█ █▀▀
# █░▀░█ █▄█ █▄█ ▄█ ██▄   █▄█ █ █░▀█ █▄▀ █ █░▀█ █▄█
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = CTRL ALT, right, workspace, e+1
bind = CTRL ALT, left, workspace, e-1
bind = SUPER, S, exec, .local/bin/minimizew
