# "Smart gaps" / "No gaps when only"
workspace = w[t1], gapsout:0, gapsin:0
workspace = w[tg1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule {
  name = windowrule-25
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = w[t1]
}

windowrule {
  name = windowrule-26
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = w[tg1]
}

windowrule {
  name = windowrule-27
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = f[1]
}

