finders {
    default_finder = recent
    recent {
        enabled = true
        prefix = ".."
    }
    math {
        enabled = true
        prefix = "="
    }
    files {
        enabled = true
        prefix = "/"
    }
    bookmarks {
        enabled = true
        prefix = ">"
    }
    commands {
        enabled = true
        prefix = "$"
    }
}

cache {
    enabled = true
    max_size = 500
    ttl = 3600
}

general {
    grab_focus = true
    fuzzy_search = true
    show_recent = true
    recent_count = 10
}

# UI SETTINGS (ADD THIS)
ui {
    # Increase launcher window size
    window_size = 1200 800   # width height (default is ~400x260)

    font_size = 20
    # Increase UI scale (zoom level)
    scale = 1.5            # try 1.2–1.6 depending on preference

    # Optional but recommended
    rounding = 12
    border_size = 2

    # Ensure icons are actually shown
    show_icons = true
    icon_size = 32          # try 24 / 32 / 48

    # Theme integration
    background_color = "#1a1a2e"
    text_color = "#eeeeee"
    accent_color = "#7f5af0"

    # Layout options
    position = "center"
    transparency = 0.9
    max_results = 15
}
