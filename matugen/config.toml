[config]
# Template directory
template_dir = "~/.config/matugen/templates"

# Color scheme type - Material You
scheme = "material"
mode = "dark"

# Contrast level (0.0 to 1.0)
contrast = 0.0

[templates]

# Kitty terminal
[templates.kitty]
input_path = '~/.config/matugen/templates/kitty.conf'
output_path = '~/.config/kitty/themes/matugen.conf'
post_hook = 'kitty +kitten themes --reload-in=all matugen 2>/dev/null || true'

# Alacritty terminal
[templates.alacritty]
input_path = '~/.config/matugen/templates/alacritty.toml'
output_path = '~/.config/alacritty/colors.toml'

# Ghostty terminal
[templates.ghostty]
input_path = '~/.config/matugen/templates/ghostty'
output_path = '~/.config/ghostty/themes/Matugen'

# Firefox userChrome.css
[templates.firefox]
input_path = '~/.config/matugen/templates/firefox.css'
output_path = '~/.mozilla/firefox/matugen/chrome/userChrome.css'

# Vivaldi custom CSS
[templates.vivaldi]
input_path = '~/.config/matugen/templates/vivaldi.css'
output_path = '~/.config/vivaldi/matugen.css'

# GTK 3.0
[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface color-scheme prefer-dark 2>/dev/null; gsettings set org.gnome.desktop.interface gtk-theme "" 2>/dev/null; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-dark 2>/dev/null || true'

# GTK 4.0
[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

# Qt5ct
[templates.qt5ct]
input_path = '~/.config/matugen/templates/qt-colors.conf'
output_path = '~/.config/qt5ct/colors/matugen.conf'

# Qt6ct
[templates.qt6ct]
input_path = '~/.config/matugen/templates/qt-colors.conf'
output_path = '~/.config/qt6ct/colors/matugen.conf'

# KDE globals
[templates.kdeglobals]
input_path = '~/.config/matugen/templates/kdeglobals'
output_path = '~/.config/kdeglobals'

# Kvantum
[templates.kvantum]
input_path = '~/.config/matugen/templates/kvantum.kvconfig'
output_path = '~/.config/Kvantum/kvantum.kvconfig'

# Rofi
[templates.rofi]
input_path = '~/.config/matugen/templates/rofi.rasi'
output_path = '~/.config/rofi/colors.rasi'

# Dunst
[templates.dunst]
input_path = '~/.config/matugen/templates/dunst.conf'
output_path = '~/.config/dunst/dunstrc'
post_hook = 'dunstctl reload 2>/dev/null || true'

# Hyprland
[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland.conf'
output_path = '~/.config/hypr/colors_matugen.conf'
post_hook = 'hyprctl keyword source ~/.config/hypr/colors_matugen.conf 2>/dev/null || true'

# Mako
[templates.mako]
input_path = '~/.config/matugen/templates/mako.conf'
output_path = '~/.config/mako/config'
post_hook = 'makoctl reload 2>/dev/null || true'

# Btop
[templates.btop]
input_path = '~/.config/matugen/templates/btop.theme'
output_path = '~/.config/btop/themes/matugen.theme'
post_hook = 'pkill -USR2 btop 2>/dev/null || true'

# Wofi
[templates.wofi]
input_path = '~/.config/matugen/templates/wofi.css'
output_path = '~/.config/wofi/colors.css'

# SwayNC
[templates.swaync]
input_path = '~/.config/matugen/templates/swaync.css'
output_path = '~/.config/swaync/colors.css'
post_hook = 'swaync-client -rs 2>/dev/null || true'

# Starship
[templates.starship]
input_path = '~/.config/matugen/templates/starship.toml'
output_path = '~/.config/starship_colors.toml'

# Tmux
[templates.tmux]
input_path = '~/.config/matugen/templates/tmux.conf'
output_path = '~/.config/tmux/matugen.conf'

# Zed editor
[templates.zed]
input_path = '~/.config/matugen/templates/zed.json'
output_path = '~/.config/zed/themes/matugen.json'
