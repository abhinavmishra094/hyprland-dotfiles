# Alacritty colors - Material You
# Generated by matugen

[colors.primary]
background = "{{colors.background.default.hex}}"
foreground = "{{colors.on_background.default.hex}}"

[colors.cursor]
text = "{{colors.on_primary.default.hex}}"
cursor = "{{colors.primary.default.hex}}"

[colors.selection]
text = "{{colors.on_primary_container.default.hex}}"
background = "{{colors.primary_container.default.hex}}"

[colors.normal]
black = "{{colors.surface.default.hex}}"
red = "{{colors.error.default.hex}}"
green = "{{colors.tertiary.default.hex}}"
yellow = "{{colors.secondary.default.hex}}"
blue = "{{colors.primary.default.hex}}"
magenta = "{{colors.tertiary_fixed_dim.default.hex}}"
cyan = "{{colors.secondary.default.hex}}"
white = "{{colors.on_surface_variant.default.hex}}"

[colors.bright]
black = "{{colors.outline.default.hex}}"
red = "{{colors.error.default.hex | set_lightness: 70}}"
green = "{{colors.tertiary.default.hex | set_lightness: 70}}"
yellow = "{{colors.secondary.default.hex | set_lightness: 70}}"
blue = "{{colors.primary.default.hex | set_lightness: 70}}"
magenta = "{{colors.tertiary_fixed.default.hex}}"
cyan = "{{colors.secondary_fixed.default.hex}}"
white = "{{colors.on_surface.default.hex}}"

[[colors.indexed_colors]]
index = 16
# Use primary fixed dim or fallback
color = "{{colors.primary_fixed_dim.default.hex}}"

[[colors.indexed_colors]]
index = 17
color = "{{colors.tertiary_fixed_dim.default.hex}}"
