# Dunst notification colors - Material You
# Generated by matugen

[global]
    frame_color = "{{colors.primary.default.hex}}"
    separator_color = "{{colors.outline.default.hex}}"
    
    # Geometry
    width = 300
    height = 100
    origin = top-right
    offset = 20x20
    scale = 0
    notification_limit = 0
    
    # Progress bar
    progress_bar = true
    progress_bar_height = 10
    progress_bar_frame_width = 1
    progress_bar_min_width = 150
    progress_bar_max_width = 300
    
    # Behavior
    indicate_hidden = yes
    transparency = 0
    gap_size = 10
    separator_height = 2
    padding = 15
    horizontal_padding = 15
    text_icon_padding = 10
    frame_width = 2
    sort = yes
    idle_threshold = 120
    font = "Monospace 11"
    line_height = 0
    markup = full
    format = "<b>%s</b>\n%b"
    alignment = left
    vertical_alignment = center
    show_age_threshold = 60
    word_wrap = yes
    ellipsize = middle
    ignore_newline = no
    stack_duplicates = true
    hide_duplicate_count = false
    show_indicators = yes
    enable_recursive_icon_lookup = true
    icon_position = left
    min_icon_size = 32
    max_icon_size = 128
    sticky_history = yes
    history_length = 20
    dmenu = /usr/bin/wofi --dmenu
    browser = /usr/bin/xdg-open
    always_run_script = true
    title = Dunst
    class = Dunst
    ignore_dbusclose = false
    force_xwayland = false
    force_xinerama = false
    mouse_left_click = close_current
    mouse_middle_click = do_action, close_current
    mouse_right_click = close_all

[urgency_low]
    background = "{{colors.surface.default.hex}}"
    foreground = "{{colors.on_surface_variant.default.hex}}"
    frame_color = "{{colors.outline.default.hex}}"
    timeout = 90

[urgency_normal]
    background = "{{colors.surface.default.hex}}"
    foreground = "{{colors.on_surface.default.hex}}"
    frame_color = "{{colors.primary.default.hex}}"
    timeout = 90

[urgency_critical]
    background = "{{colors.error_container.default.hex}}"
    foreground = "{{colors.on_error_container.default.hex}}"
    frame_color = "{{colors.error.default.hex}}"
    timeout = 90
