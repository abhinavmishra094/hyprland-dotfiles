# Tmux color scheme - Material You
# Generated by matugen

# Status bar colors
set -g status-bg "{{colors.background.default.hex}}"
set -g status-fg "{{colors.on_background.default.hex}}"

# Active window
set -g window-status-current-bg "{{colors.primary_container.default.hex}}"
set -g window-status-current-fg "{{colors.on_primary_container.default.hex}}"

# Inactive window
set -g window-status-bg "{{colors.surface.default.hex}}"
set -g window-status-fg "{{colors.on_surface.default.hex}}"

# Pane borders
set -g pane-active-border-style "fg={{colors.primary.default.hex}}"
set -g pane-border-style "fg={{colors.surface_variant.default.hex}}"

# Message text
set -g message-bg "{{colors.surface.default.hex}}"
set -g message-fg "{{colors.on_surface.default.hex}}"

# Clock mode
set -g clock-mode-color "{{colors.primary.default.hex}}"

# Copy mode
set -g mode-bg "{{colors.primary_container.default.hex}}"
set -g mode-fg "{{colors.on_primary_container.default.hex}}"

# Color variables for external use
set -g @thm_bg "{{colors.background.default.hex}}"
set -g @thm_fg "{{colors.on_background.default.hex}}"
set -g @thm_surface "{{colors.surface.default.hex}}"
set -g @thm_surface_variant "{{colors.surface_variant.default.hex}}"
set -g @thm_primary "{{colors.primary.default.hex}}"
set -g @thm_on_primary "{{colors.on_primary.default.hex}}"
set -g @thm_primary_container "{{colors.primary_container.default.hex}}"
set -g @thm_on_primary_container "{{colors.on_primary_container.default.hex}}"
set -g @thm_secondary "{{colors.secondary.default.hex}}"
set -g @thm_on_secondary "{{colors.on_secondary.default.hex}}"
set -g @thm_secondary_container "{{colors.secondary_container.default.hex}}"
set -g @thm_on_secondary_container "{{colors.on_secondary_container.default.hex}}"
set -g @thm_tertiary "{{colors.tertiary.default.hex}}"
set -g @thm_on_tertiary "{{colors.on_tertiary.default.hex}}"
set -g @thm_tertiary_container "{{colors.tertiary_container.default.hex}}"
set -g @thm_on_tertiary_container "{{colors.on_tertiary_container.default.hex}}"
set -g @thm_error "{{colors.error.default.hex}}"
set -g @thm_on_error "{{colors.on_error.default.hex}}"
set -g @thm_outline "{{colors.outline.default.hex}}"
