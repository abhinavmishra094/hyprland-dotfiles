# Hyprland colors - Material You
# Generated by matugen

# General
 general {
    col.active_border = {{colors.primary.default.hex}} {{colors.secondary.default.hex}} {{colors.tertiary.default.hex}} 45deg
    col.inactive_border = {{colors.surface_variant.default.hex}}
    col.nogroup_border = {{colors.outline.default.hex}}
    col.nogroup_border_active = {{colors.primary.default.hex}} {{colors.secondary.default.hex}} 45deg
}

# Decoration
decoration {
    col.shadow = {{colors.shadow.default.hex}}
    col.shadow_inactive = {{colors.shadow.default.hex | set_alpha: 0.5}}
}

# Group
group {
    col.border_active = {{colors.primary.default.hex}}
    col.border_inactive = {{colors.surface_variant.default.hex}}
    col.border_locked_active = {{colors.error.default.hex}}
    col.border_locked_inactive = {{colors.surface_variant.default.hex}}

    groupbar {
        col.active = {{colors.primary.default.hex}}
        col.inactive = {{colors.surface_variant.default.hex}}
        col.locked_active = {{colors.error.default.hex}}
        col.locked_inactive = {{colors.surface_variant.default.hex}}
    }
}

# Misc
misc {
    background_color = {{colors.background.default.hex}}
}

# Window colors
windowrulev2 = bordercolor {{colors.error.default.hex}}, fullscreen:1

# Additional color variables for external use
env = MATUGEN_BACKGROUND,{{colors.background.default.hex}}
env = MATUGEN_FOREGROUND,{{colors.on_background.default.hex}}
env = MATUGEN_PRIMARY,{{colors.primary.default.hex}}
env = MATUGEN_SECONDARY,{{colors.secondary.default.hex}}
env = MATUGEN_TERTIARY,{{colors.tertiary.default.hex}}
env = MATUGEN_ERROR,{{colors.error.default.hex}}
