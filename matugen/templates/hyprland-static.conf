# Hyprland colors - Static Theme
# Generated by matugen

# Note: These colors are defined as variables for use in other parts of hyprland.conf
# The actual color assignments must be done in the main config or separate files
# because Hyprland doesn't support variables inside config blocks

$background = {{colors.background.default.hex}}
$foreground = {{colors.on_background.default.hex}}
$surface = {{colors.surface.default.hex}}
$surface_variant = {{colors.surface_variant.default.hex}}
$primary = {{colors.primary.default.hex}}
$on_primary = {{colors.on_primary.default.hex}}
$secondary = {{colors.secondary.default.hex}}
$on_secondary = {{colors.on_secondary.default.hex}}
$tertiary = {{colors.tertiary.default.hex}}
$on_tertiary = {{colors.on_tertiary.default.hex}}
$error = {{colors.error.default.hex}}
$on_error = {{colors.on_error.default.hex}}
$outline = {{colors.outline.default.hex}}
$shadow = {{colors.shadow.default.hex}}

# Environment variables (can be used by scripts)
env = MATUGEN_BACKGROUND,{{colors.background.default.hex}}
env = MATUGEN_FOREGROUND,{{colors.on_background.default.hex}}
env = MATUGEN_PRIMARY,{{colors.primary.default.hex}}
env = MATUGEN_SECONDARY,{{colors.secondary.default.hex}}
env = MATUGEN_TERTIARY,{{colors.tertiary.default.hex}}
env = MATUGEN_ERROR,{{colors.error.default.hex}}
env = MATUGEN_SURFACE,{{colors.surface.default.hex}}
env = MATUGEN_SURFACE_VARIANT,{{colors.surface_variant.default.hex}}
