# Material You color scheme generated by matugen
# Integrated with matugen theming

background = "{{colors.background.default.hex}}"
foreground = "{{colors.on_background.default.hex}}"
cursor = "{{colors.primary.default.hex}}"
selection_background = "{{colors.primary_container.default.hex}}"
selection_foreground = "{{colors.on_primary_container.default.hex}}"

primary = "{{colors.primary.default.hex}}"
on_primary = "{{colors.on_primary.default.hex}}"
primary_container = "{{colors.primary_container.default.hex}}"
on_primary_container = "{{colors.on_primary_container.default.hex}}"

secondary = "{{colors.secondary.default.hex}}"
on_secondary = "{{colors.on_secondary.default.hex}}"
secondary_container = "{{colors.secondary_container.default.hex}}"
on_secondary_container = "{{colors.on_secondary_container.default.hex}}"

tertiary = "{{colors.tertiary.default.hex}}"
on_tertiary = "{{colors.on_tertiary.default.hex}}"
tertiary_container = "{{colors.tertiary_container.default.hex}}"
on_tertiary_container = "{{colors.on_tertiary_container.default.hex}}"

error = "{{colors.error.default.hex}}"
on_error = "{{colors.on_error.default.hex}}"
error_container = "{{colors.error_container.default.hex}}"
on_error_container = "{{colors.on_error_container.default.hex}}"

surface = "{{colors.surface.default.hex}}"
on_surface = "{{colors.on_surface.default.hex}}"
surface_variant = "{{colors.surface_variant.default.hex}}"
on_surface_variant = "{{colors.on_surface_variant.default.hex}}"

outline = "{{colors.outline.default.hex}}"
outline_variant = "{{colors.outline_variant.default.hex}}"
shadow = "{{colors.shadow.default.hex}}"
scrim = "{{colors.scrim.default.hex}}"

inverse_surface = "{{colors.inverse_surface.default.hex}}"
inverse_on_surface = "{{colors.inverse_on_surface.default.hex}}"
inverse_primary = "{{colors.inverse_primary.default.hex}}"

# Terminal colors for matugen compatibility
[colors]
color0 = "{{colors.surface.default.hex}}"
color1 = "{{colors.error.default.hex}}"
color2 = "{{colors.tertiary.default.hex}}"
color3 = "{{colors.secondary.default.hex}}"
color4 = "{{colors.primary.default.hex}}"
color5 = "{{colors.tertiary_fixed_dim.default.hex}}"
color6 = "{{colors.secondary.default.hex}}"
color7 = "{{colors.on_surface.default.hex}}"
color8 = "{{colors.outline.default.hex}}"
color9 = "{{colors.error.default.hex | set_lightness: 70}}"
color10 = "{{colors.tertiary.default.hex | set_lightness: 70}}"
color11 = "{{colors.secondary.default.hex | set_lightness: 70}}"
color12 = "{{colors.primary.default.hex | set_lightness: 70}}"
color13 = "{{colors.tertiary_fixed.default.hex}}"
color14 = "{{colors.secondary_fixed.default.hex}}"
color15 = "{{colors.on_surface_variant.default.hex}}"
