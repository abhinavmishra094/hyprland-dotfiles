# Starship prompt colors - Material You
# Generated by matugen

# Palette
[palettes.matugen]
background = "{{colors.background.default.hex}}"
foreground = "{{colors.on_background.default.hex}}"
surface = "{{colors.surface.default.hex}}"
primary = "{{colors.primary.default.hex}}"
secondary = "{{colors.secondary.default.hex}}"
tertiary = "{{colors.tertiary.default.hex}}"
error = "{{colors.error.default.hex}}"
success = "{{colors.tertiary.default.hex}}"
warning = "{{colors.secondary.default.hex}}"

# Use the palette
palette = "matugen"

# Character
[character]
success_symbol = "[➜]({{colors.primary.default.hex}})"
error_symbol = "[✗]({{colors.error.default.hex}})"

# Directory
[directory]
style = "{{colors.primary.default.hex}} bold"
truncation_length = 3
truncation_symbol = "…/"

# Git
[git_branch]
style = "{{colors.secondary.default.hex}}"
symbol = ""

[git_status]
style = "{{colors.tertiary.default.hex}}"
conflicted = ""
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Language modules
[nodejs]
style = "{{colors.tertiary.default.hex}}"
symbol = ""

[python]
style = "{{colors.secondary.default.hex}}"
symbol = ""

[ruby]
style = "{{colors.error.default.hex}}"
symbol = ""

[rust]
style = "{{colors.primary.default.hex}}"
symbol = ""

[golang]
style = "{{colors.tertiary.default.hex}}"
symbol = ""

[java]
style = "{{colors.error.default.hex}}"
symbol = ""

# Time
[time]
disabled = false
format = "[$time]($style) "
time_format = "%T"
style = "{{colors.on_surface_variant.default.hex}}"

# Username
[username]
style_user = "{{colors.primary.default.hex}} bold"
style_root = "{{colors.error.default.hex}} bold"
format = "[$user]($style) "
disabled = false
show_always = false

# Hostname
[hostname]
ssh_only = false
format = "[$hostname]($style) "
style = "{{colors.secondary.default.hex}} dimmed"
disabled = false

# Status
[status]
style = "{{colors.error.default.hex}}"
symbol = ""
success_symbol = ""
disabled = false

# Container
[container]
symbol = ""
style = "{{colors.tertiary.default.hex}}"

# Jobs
[jobs]
symbol = ""
style = "{{colors.secondary.default.hex}}"

# Battery
[battery]
full_symbol = ""
charging_symbol = ""
discharging_symbol = ""
unknown_symbol = ""
empty_symbol = ""

[[battery.display]]
threshold = 10
style = "{{colors.error.default.hex}}"

[[battery.display]]
threshold = 30
style = "{{colors.secondary.default.hex}}"

[[battery.display]]
threshold = 100
style = "{{colors.tertiary.default.hex}}"

# Line break
[line_break]
disabled = false

# Fill
[fill]
symbol = " "
style = "{{colors.outline.default.hex}}"
